<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Browser caching: cache HTML for 1 week, assets for 1 year -->
    <meta http-equiv="expires" content="604800" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preload critical font for faster LCP -->
    <link rel="preload" as="font" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" crossorigin />
    <title>Base44 APP</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Main app bundle - module type defers automatically -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Non-critical external scripts loaded async to avoid blocking rendering -->
    <!-- GoogleTagManager and analytics loaded after page interactive -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=your-ga-id"></script>
  </body>
</html>
