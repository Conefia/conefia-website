<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!--
      FONT LOADING STRATEGY:
      1. preconnect to fonts.googleapis.com (early TCP/TLS)
      2. preconnect to fonts.gstatic.com crossorigin (font files need crossorigin)
      3. Load stylesheet normally — Google Fonts injects font-display:swap automatically
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap"
    />

    <!--
      RESOURCE HINTS — CDN origins used throughout the site.
      preconnect: for origins where we fetch resources soon after paint.
      dns-prefetch: cheaper (DNS-only) for origins used later or less frequently.
    -->

    <!-- Supabase storage CDN — logo images in header/footer (critical path) -->
    <link rel="preconnect" href="https://qtrypzzcjebvfcihiynt.supabase.co" crossorigin />

    <!-- Unsplash/Fastly image CDN — section photos (first used just below fold) -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <!-- SVG logo CDN — tech stack carousels on solution pages -->
    <link rel="dns-prefetch" href="https://logo.svgcdn.com" />

    <!-- Calendly — only loaded on /book page -->
    <link rel="dns-prefetch" href="https://calendly.com" />
    <link rel="dns-prefetch" href="https://assets.calendly.com" />

    <!--
      CRITICAL IMAGE PRELOAD — the header logo is above the fold on every page.
      fetchpriority="high" moves it ahead of other network requests.
      imagesrcset lets the browser choose the right density variant immediately.
    -->
    <link
      rel="preload"
      as="image"
      href="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/695311d1426e4dadf87a8d53/d014c4e67_conefia_logo_header_80h_2x.png"
      fetchpriority="high"
    />

    <!--
      CACHE HINTS — these meta tags signal preferred caching to CDN edge nodes
      and some proxy caches. Actual Cache-Control headers are set by the server.
    -->
    <!-- Tell CDNs / proxies this page can be cached for 5 minutes -->
    <meta http-equiv="Cache-Control" content="public, max-age=300, stale-while-revalidate=600" />

    <title>Conefia — Build, Launch & Scale Your Digital Venture</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Main app bundle — type="module" defers automatically (ES module semantics) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
